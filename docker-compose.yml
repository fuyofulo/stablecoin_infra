services:
  postgres:
    image: postgres:16
    container_name: usdc-ops-postgres
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: usdc_ops
      POSTGRES_USER: usdc_ops
      POSTGRES_PASSWORD: usdc_ops
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usdc_ops -d usdc_ops"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: usdc-ops-clickhouse
    restart: unless-stopped
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      CLICKHOUSE_DB: usdc_ops
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
